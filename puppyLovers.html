<!DOCTYPE html>
<html lang="en">
<head>

    <title>Puppy Lovers</title>

<body>
    <header>
        <div align="center">

                    </th>

        <div align="center">

                    <td align="center">

                </tr>
            </table>
        </div>
        <br><br>

        <section>
            <div align="center">
                <table width="80%" cellspacing="10" cellpadding="0" align="center">

            <br>

            <div align="center">
                <table width="100%" cellpadding="20">

            </div>
            <br>

            <div align="center">
                <table width="90%" cellspacing="50" cellpadding="0" align="center">

                    </tr>
                </table>

    <br><br>
    <footer>
        <div align="center">
            <table width="100%" bgcolor="#0e4b63" cellpadding="40" cellspacing="0">
                <tr>
                    <th align="center">
                        <font color="white" size="5">
